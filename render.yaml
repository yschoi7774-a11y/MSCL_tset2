services:
  - type: web
    name: mothersmile-leave-manager
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATA_DIR
        value: /data
      - key: NODE_ENV
        value: production
    disk:
      name: leave-data
      mountPath: /data
      sizeGB: 1
